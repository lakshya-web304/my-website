<style>

/* BIG RGB Neon Card */
.card{
    position:relative;
    padding:30px;
    border-radius:25px;
    background:#0f172a;
    color:white;
    z-index:1;
    overflow:hidden;
}

/* Outer RGB Layer */
.card::before{
    content:"";
    position:absolute;
    top:-6px;
    left:-6px;
    right:-6px;
    bottom:-6px;
    border-radius:30px;
    background:linear-gradient(
        90deg,
        #ff0000,
        #ff7300,
        #fffb00,
        #48ff00,
        #00ffd5,
        #002bff,
        #7a00ff,
        #ff00c8,
        #ff0000
    );
    background-size:400%;
    z-index:-2;
    animation:rgbMove 6s linear infinite;
    filter:blur(8px);
}

/* Inner solid background */
.card::after{
    content:"";
    position:absolute;
    inset:0;
    border-radius:25px;
    background:#0f172a;
    z-index:-1;
}

/* Animation */
@keyframes rgbMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

</style>
