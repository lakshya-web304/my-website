<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My First Website</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #2c3e50;
      color: white;
      padding: 20px;
      text-align: center;
    }

    section {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    footer {
      background-color: #2c3e50;
      color: white;
      text-align: center;
      padding: 10px;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
  </style>
</head>

<body>

<header>
  <h1>Welcome to My First Website</h1>
  <p>Created by a Class 9 Student 🚀</p>
</header>

<section>
  <div class="card">
    <h2>About Me</h2>
    <p>Hello! I am learning web development and this is my first website.</p>
  </div>

  <div class="card">
    <h2>My Goal</h2>
    <p>I want to become a software engineer and work at Google.</p>
  </div>

  <div class="card">
    <h2>Contact</h2>
    <p>Email: example@email.com</p>
  </div>
</section>

<footer>
  <p>© 2025 My First Website</p>
</footer>

</body>
</html>
